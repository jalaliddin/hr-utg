services:

  # ── Nginx: Frontend (Vue SPA) + API reverse proxy ──────────────────────────
  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - storage:/var/www/storage/app/public:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - app_net

  # ── PHP-FPM: Laravel backend ────────────────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    volumes:
      - storage:/var/www/storage/app/public
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_net

  # ── Queue worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=90", "--no-interaction"]
    env_file:
      - ./backend/.env
    volumes:
      - storage:/var/www/storage/app/public
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - app_net

  # ── Scheduler (cron every minute) ──────────────────────────────────────────
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["/bin/sh", "-c", "while true; do php artisan schedule:run --no-interaction >> /dev/null 2>&1; sleep 60; done"]
    env_file:
      - ./backend/.env
    volumes:
      - storage:/var/www/storage/app/public
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - app_net

  # ── MySQL 8 ─────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE:      ${DB_DATABASE:-hr_prod}
      MYSQL_USER:          ${DB_USERNAME:-hruser}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-hrpassword}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-changeme123}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-changeme123}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - app_net

volumes:
  mysql_data:
  storage:

networks:
  app_net:
    driver: bridge
